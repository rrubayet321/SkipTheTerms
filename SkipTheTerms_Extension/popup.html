<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkipTheTerms</title>
  <style>
    /* ─── Reset & Base ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 400px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #e8eaff;
      background: #0d1435;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(91, 124, 246, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(124, 77, 255, 0.2) 0%, transparent 60%);
      overflow: hidden;
    }

    /* ─── Layout ─── */
    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px 16px 14px;
      min-height: 480px;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #5b7cf6, #7c4dff);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(91, 124, 246, 0.45);
    }

    .logo svg {
      display: block;
    }

    .header-text h1 {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #fff;
      line-height: 1.1;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(160, 180, 255, 0.55);
      margin-top: 2px;
      font-weight: 500;
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.12), transparent);
      flex-shrink: 0;
    }

    /* ─── Summarize Button ─── */
    #summarize-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #5b7cf6 0%, #7c4dff 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      box-shadow: 0 4px 20px rgba(91, 124, 246, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      font-family: inherit;
    }

    #summarize-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(91, 124, 246, 0.6);
    }

    #summarize-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #summarize-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* ─── Spinner ─── */
    #spinner-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
    }

    #spinner-wrap.visible {
      display: flex;
    }

    .spinner-ring {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: #7c9ef8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #spinner-wrap p {
      font-size: 12px;
      color: rgba(160, 190, 255, 0.65);
      font-weight: 500;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* ─── Error Banner ─── */
    #error-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    #error-banner.visible {
      display: flex;
    }

    #error-banner svg {
      flex-shrink: 0;
      margin-top: 1px;
    }

    #error-text {
      font-size: 13px;
      color: #fca5a5;
      line-height: 1.5;
    }

    /* ─── Results Area ─── */
    #results-area {
      display: none;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
    }

    #results-area.visible {
      display: flex;
    }

    /* Scrollbar */
    #results-area::-webkit-scrollbar {
      width: 4px;
    }

    #results-area::-webkit-scrollbar-track {
      background: transparent;
    }

    #results-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.18);
      border-radius: 9999px;
    }

    /* Empty state */
    .empty-state {
      font-size: 13px;
      color: rgba(160, 180, 255, 0.4);
      text-align: center;
      padding: 20px 0;
    }

    /* Bullet items */
    .bullet-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 13px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: background 0.2s ease;
      opacity: 0;
      transform: translateY(8px);
      animation: slideUp 0.35s ease forwards;
    }

    .bullet-item:hover {
      background: rgba(255, 255, 255, 0.09);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bullet-dot {
      color: #7c9ef8;
      font-weight: 800;
      font-size: 16px;
      line-height: 1.3;
      flex-shrink: 0;
    }

    .bullet-text {
      font-size: 13px;
      color: rgba(220, 230, 255, 0.88);
      line-height: 1.55;
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: auto;
      text-align: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.18);
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="9" y1="13" x2="15" y2="13" />
          <line x1="9" y1="17" x2="12" y2="17" />
        </svg>
      </div>
      <div class="header-text">
        <h1>SkipTheTerms</h1>
        <p>TL;DR for legal nonsense 🎉</p>
      </div>
    </header>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Summarize Button -->
    <button id="summarize-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
      Summarize This Page
    </button>

    <!-- Loading Spinner -->
    <div id="spinner-wrap">
      <div class="spinner-ring"></div>
      <p>Reading the fine print so you don't have to…</p>
    </div>

    <!-- Error Banner -->
    <div id="error-banner">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span id="error-text"></span>
    </div>

    <!-- Results Area -->
    <div id="results-area">
      <!-- Bullet points injected by popup.js -->
    </div>

    <!-- Footer -->
    <footer class="footer">Powered by Groq · SkipTheTerms v1.0</footer>

  </div>

  <script src="popup.js"></script>
</body>

</html>
